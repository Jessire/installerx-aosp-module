name: Build InstallerX AOSP Module

# Builds the online AOSP variant of wxxsfxyzm/InstallerX-Revived from source
# (applicationId=com.android.packageinstaller) and packs a flashable
# Magisk/KernelSU module mirroring the official module layout.
#
# Triggers:
#   - schedule      : poll upstream for a new Preview pre-release; build only
#                     when that version has not been built yet.
#   - workflow_dispatch : manual run (optional ref + force rebuild).
#
# On success the module zip is published as a draft pre-release and pushed to a
# Telegram bot (sendDocument).

on:
  schedule:
    # Poll every 6 hours (UTC). GitHub may delay scheduled runs under load.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Upstream ref to build (blank = latest Preview pre-release tag)"
        type: string
        required: false
        default: ""
      force:
        description: "Rebuild even if this version was already built"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  UPSTREAM: wxxsfxyzm/InstallerX-Revived
  APP_ID: com.android.packageinstaller

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      ref: ${{ steps.decide.outputs.ref }}
      module_tag: ${{ steps.decide.outputs.module_tag }}
    steps:
      - name: Resolve upstream ref and dedup
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REF="${{ inputs.ref }}"
          if [ -z "$REF" ]; then
            # Latest Preview pre-release tag (auto-preview keeps a single rolling tag).
            REF=$(gh release list --repo "$UPSTREAM" --limit 30 \
                  --json tagName,isPrerelease,createdAt \
                  --jq 'map(select(.isPrerelease)) | sort_by(.createdAt) | reverse | .[0].tagName')
          fi
          if [ -z "$REF" ] || [ "$REF" = "null" ]; then
            echo "ERROR: could not resolve a Preview pre-release tag." >&2
            exit 1
          fi

          MODULE_TAG="module-${REF}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "module_tag=$MODULE_TAG" >> "$GITHUB_OUTPUT"

          FORCE="${{ inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force requested; will build $REF."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Dedup against our own already-built module releases.
          if gh release view "$MODULE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Module for $REF already built ($MODULE_TAG); skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream version $REF; will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (module tooling)
        uses: actions/checkout@v4
        with:
          path: tooling

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM }}
          ref: ${{ needs.check.outputs.ref }}
          fetch-depth: 0
          path: upstream

      - name: Derive version metadata
        id: meta
        run: |
          set -euo pipefail
          cd upstream
          VERSION="${{ needs.check.outputs.ref }}"
          # Faithful monotonic versionCode: upstream git commit count (same basis
          # the project uses for the APK versionCode).
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION code=$VERSION_CODE"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Optional signing key
        id: signing
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          cd upstream
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] \
             || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            echo "No signing secrets; release build falls back to the debug keystore."
            exit 0
          fi
          mkdir -p keystore
          echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > keystore/carlyu.jks
          {
            echo "storeFile=keystore/carlyu.jks"
            echo "keyAlias=$SIGNING_KEY_ALIAS"
            echo "keyPassword=$SIGNING_KEY_PASSWORD"
            echo "storePassword=$SIGNING_STORE_PASSWORD"
          } > keystore.properties

      - name: Grant gradlew execute permission
        run: chmod +x upstream/gradlew

      - name: Build online AOSP-variant APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd upstream
          ./gradlew assembleOnlinePreviewRelease \
            -PAPP_ID="${{ env.APP_ID }}" \
            -PVERSION_NAME="${{ steps.meta.outputs.version }}"

      - name: Pack module
        id: pack
        run: |
          set -euo pipefail
          chmod +x tooling/scripts/pack-module.sh
          mkdir -p dist
          VERSION="${{ steps.meta.outputs.version }}"
          CODE="${{ steps.meta.outputs.version_code }}"
          apk=$(find "upstream/app/build/outputs/apk/onlinePreview/release" \
                -maxdepth 1 -type f -name "*.apk" | head -n1)
          if [ -z "$apk" ]; then
            echo "ERROR: online APK not found" >&2
            find upstream/app/build/outputs/apk -type f -name "*.apk" || true
            exit 1
          fi
          ZIP="dist/InstallerX-AOSP-${VERSION}-online.zip"
          tooling/scripts/pack-module.sh "$apk" "$VERSION" "$CODE" online "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: installerx-aosp-module-${{ steps.meta.outputs.version }}
          path: dist/*.zip
          retention-days: 30

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          name: "InstallerX AOSP Module ${{ steps.meta.outputs.version }}"
          tag_name: ${{ needs.check.outputs.module_tag }}
          draft: true
          prerelease: true
          generate_release_notes: false
          files: dist/*.zip

      - name: Send module to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.meta.outputs.version }}
          ZIP: ${{ steps.pack.outputs.zip }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not set; skipping notification."
            exit 0
          fi
          CAPTION=$(printf 'InstallerX AOSP Module\nVersion: %s\nFlash in Magisk / KernelSU / APatch.' "$VERSION")
          HTTP=$(curl -sS -o /tmp/tg_resp.json -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${ZIP}" \
            -F "caption=${CAPTION}")
          echo "Telegram HTTP $HTTP"
          cat /tmp/tg_resp.json
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: Telegram delivery failed." >&2
            exit 1
          fi