name: Telegram Bot

on:
  schedule:
    # GitHub Actions has no inbound webhook endpoint for Telegram, so the bot
    # polls commands. Scheduled runs may be delayed by GitHub under load.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Poll Telegram commands
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_WORKFLOW: build-aosp-module.yml
          STATE_FILE: .github/telegram-offset.txt
        run: python .github/scripts/telegram_bot.py

      - name: Persist Telegram offset
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/telegram-offset.txt; then
            echo "Telegram offset unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/telegram-offset.txt
          git commit -m "Update Telegram bot offset"
          git push
